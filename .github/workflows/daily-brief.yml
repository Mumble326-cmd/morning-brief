name: Daily Morning Brief

on:
  schedule:
    # 1:00 AM UTC = 6:30 AM Sri Lanka time (UTC+5:30)
    # Runs Monday to Friday
    - cron: '0 1 * * 1-5'

  # Lets you trigger a run manually from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write  # commit the generated brief back to main
  issues: write    # open risk-alert issues
  pages: write     # deploy to GitHub Pages
  id-token: write  # required by actions/deploy-pages for OIDC

jobs:
  generate:
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Set up Python 3.11
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate the brief
        run: python brief.py

      - name: Commit and push outputs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/
          # Only commit if files actually changed
          git diff --staged --quiet && echo "No changes to commit." || git commit -m "Daily brief: $(date -u +'%Y-%m-%d')"
          git push origin HEAD:main

      - name: Open issue for new risk stories
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(python -c "import json; print(json.load(open('data/alerts.json')).get('alert_count', 0))" 2>/dev/null || echo 0)
          if [ "$count" -gt 0 ]; then
            python -c "import json; print(json.load(open('data/alerts.json')).get('issue_body', ''))" > /tmp/alert_body.md
            title="Risk alert: $count new risk story(ies) — $(date -u +'%Y-%m-%d')"
            gh label create risk-alert --color B60205 --description "New risk_watch story in the Morning Brief" 2>/dev/null || true
            gh issue create --title "$title" --body-file /tmp/alert_body.md --label risk-alert \
              || gh issue create --title "$title" --body-file /tmp/alert_body.md
          else
            echo "No new risk stories."
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Deploy the whole repo root: index.html, admin.html, keywords.json, data/
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
